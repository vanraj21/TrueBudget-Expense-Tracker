name: true_budget_app
description: "TrueBudget - Premium Personal Finance Management App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  
  # State Management
  provider: ^6.1.2
  
  # Local Storage
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # Charts
  fl_chart: ^0.68.0
  
  # Animations
  animations: ^2.0.11
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  path_provider: ^2.1.2
  share_plus: ^10.0.2
  
  # Date & Time
  table_calendar: ^3.0.9
  
  # Authentication & Security
  local_auth: ^2.1.6
  crypto: ^3.0.3
  encrypt: ^5.0.1
  
  # Export & Import
  pdf: ^3.10.7
  csv: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
